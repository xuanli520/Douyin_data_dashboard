name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migration-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: appdb
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP__NAME: ${{ vars.CI_APP_NAME || 'fastapi-boilerplate' }}
      AUTH__JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      CACHE__BACKEND: local
      DB__DATABASE: appdb
      DB__DRIVER: postgresql
      DB__HOST: 127.0.0.1
      DB__PASSWORD: postgres
      DB__PORT: 5432
      DB__USER: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Verify migration chain
        run: |
          uv run alembic upgrade head
          uv run alembic current --check-heads
          uv run alembic check
          uv run alembic downgrade base
          uv run alembic upgrade head
          uv run alembic current --check-heads
          uv run alembic check

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Sync dependencies
        run: uv sync --dev

      - name: CI Gate
        env:
          PRE_COMMIT_HOME: ./.pre-commit-cache
          PYTHONPATH: .
          APP__NAME: ${{ vars.CI_APP_NAME || 'fastapi-boilerplate' }}
          DB__DRIVER: ${{ vars.CI_DB_DRIVER || 'sqlite' }}
          DB__DATABASE: ${{ vars.CI_DB_DATABASE || 'ci.sqlite3' }}
          CACHE__BACKEND: ${{ vars.CI_CACHE_BACKEND || 'local' }}
          AUTH__JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
        run: just ci-gate
