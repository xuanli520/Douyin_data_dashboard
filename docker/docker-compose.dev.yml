version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ..:/app:rw
    environment:
      APP_DEBUG: "true"
    command: sh -c "uvicorn src.main:app --host 0.0.0.0 --port ${APP_PORT:-8000} --reload"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ..:/app:rw
    environment:
      APP_DEBUG: "true"
    command: ["sh", "-c", "${WORKER_COMMAND:-python -m src.tasks.worker}"]

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ..:/app:rw
    environment:
      APP_DEBUG: "true"
    command: ["sh", "-c", "${SCHEDULER_COMMAND:-python -m src.tasks.beat}"]

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
